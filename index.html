<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS LINE MAN - PREMIUM DESIGN</title>
    <style>
        body { font-family: sans-serif; padding: 15px; max-width: 900px; margin: 0 auto; background-color: #f4f4f7; min-height: 100vh; }
        header { display: flex; justify-content: space-between; margin-bottom: 15px; align-items: center; }
        .btn-blue { padding: 12px 20px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; color: white; border: none; background: #0070f3; }
        .container { display: grid; grid-template-columns: 1fr 1.2fr; gap: 15px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .keypad button { padding: 15px; font-size: 20px; font-weight: bold; border-radius: 8px; border: 1px solid #ddd; background-color: #f8f9fa; cursor: pointer; }
        .menu-list { display: grid; grid-template-columns: 1fr; gap: 8px; max-height: 550px; overflow-y: auto; }
        .menu-btn { display: flex; justify-content: space-between; padding: 16px; font-size: 15px; font-weight: bold; border-radius: 8px; border: 1px solid #e2e8f0; background: #fff; cursor: pointer; text-align: left; width: 100%; }
        .menu-btn:hover { background-color: #f1f5f9; }
        .btn-green { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #00cc74; color: white; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-orange { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #ff9f43; color: white; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .cart-item { display: flex; justify-content: space-between; padding: 8px 0; font-size: 14px; border-bottom: 1px solid #eee; }
        select { width: 100%; padding: 10px; border-radius: 6px; margin-top: 5px; font-size: 16px; font-weight: bold; border: 1px solid #ccc; background-color: #fff; }
        .checkbox-group { margin-top: 8px; display: flex; flex-direction: column; gap: 8px; }
        .checkbox-group label { font-size: 15px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; background: #fff; padding: 6px; border-radius: 4px; }
        .checkbox-group input { width: 18px; height: 18px; }
    </style>
</head>
<body>

    <header>
        <button class="btn-blue" onclick="connectPrinterManually()">เชื่อมต่อเครื่องพิมพ์ (Manual)</button>
        <span id="status" style="font-weight: bold; color: #ff9f43;">🔄 กำลังตรวจสอบการเชื่อมต่อ...</span>
    </header>

    <div class="container">
        <div>
            <div class="card">
                <div style="font-size: 14px; color: #666;">หมายเลขแอป LINE MAN (4 ตัวท้าย)</div>
                <div id="order-display" style="font-size: 32px; font-weight: bold; border-bottom: 2px solid #ddd; padding: 5px 0; min-height: 48px; color: #0070f3;">#</div>
                <div class="keypad">
                    <button onclick="pressKey('1')">1</button><button onclick="pressKey('2')">2</button><button onclick="pressKey('3')">3</button>
                    <button onclick="pressKey('4')">4</button><button onclick="pressKey('5')">5</button><button onclick="pressKey('6')">6</button>
                    <button onclick="pressKey('7')">7</button><button onclick="pressKey('8')">8</button><button onclick="pressKey('9')">9</button>
                    <button onclick="pressKey('C')" style="color:red;">C</button><button onclick="pressKey('0')">0</button>
                </div>
            </div>

            <div class="card">
                <h3>ตะกร้าสินค้า (<span id="cart-count">0</span>)</h3>
                <div id="cart-items" style="max-height: 180px; overflow-y: auto; margin-bottom: 10px;"></div>
                <div style="font-size: 20px; font-weight: bold; margin-bottom: 10px; text-align: right;">ยอดรวม: <span id="cart-total">0</span> ฿</div>
                
                <button class="btn-green" onclick="handlePrint()">🖨️ พิมพ์ใบเสร็จ & ตัดกระดาษ</button>
                <button class="btn-orange" onclick="handlePrintNumberOnly()">🎫 พิมพ์เฉพาะหมายเลข (คิว)</button>
            </div>
        </div>

        <div class="card">
            <h3>เลือกตัวเลือกเพิ่มเติม</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; padding: 12px; background: #f8f9fa; border-radius: 8px; border: 1px solid #e2e8f0;">
                <div>
                    <label style="font-size: 13px; font-weight: bold; color: #222;">ประเภทข้าวเหนียว (เลือกได้มากกว่า 1)</label>
                    <div class="checkbox-group">
                        <label><input type="checkbox" class="rice-checkbox" value="Normal (white)" checked> Normal (white)</label>
                        <label><input type="checkbox" class="rice-checkbox" value="blue (blue)"> blue (blue)</label>
                        <label><input type="checkbox" class="rice-checkbox" value="Pandan (green)"> Pandan (green)</label>
                    </div>
                </div>
                <div>
                    <label style="font-size: 13px; font-weight: bold; color: #222;">ความหวานมะม่วง (เลือกได้ 1 อย่าง)</label>
                    <select id="mango-select">
                        <option value="Sweet">Sweet</option>
                        <option value="Sweet & Sour">Sweet & Sour</option>
                    </select>
                </div>
            </div>

            <h3>รายการเมนู (แตะเพื่อเพิ่ม)</h3>
            <div id="menu-container" class="menu-list"></div>
        </div>
    </div>

    <script>
        const MENU_ITEMS = [
            { id: 'm_s', name: 'Mango Sticky Rice (S)', price: 89, rice: true, mango: true },
            { id: 'm_m', name: 'Mango Sticky Rice (M)', price: 129, rice: true, mango: true },
            { id: 'm_l', name: 'Mango Sticky Rice (L)', price: 189, rice: true, mango: true },
            { id: 'c_p', name: 'Custard Pudding & Sticky Rice', price: 35, rice: true },
            { id: 'c_f', name: 'Sticky Rice With Custard + Dried Fish', price: 35, rice: true },
            { id: 'd_f', name: 'Dried Fish With Sticky Rice', price: 35, rice: true },
            { id: 'p_s', name: 'Peeled Mango Ready To Eat (S)', price: 99, mango: true },
            { id: 'p_l', name: 'Peeled Mango Ready To Eat (L)', price: 159, mango: true },
            { id: 'r_100', name: 'Sticky Rice 100g', price: 30, rice: true },
            { id: 'r_200', name: 'Sticky Rice 200g', price: 60, rice: true },
            { id: 'r_300', name: 'Sticky Rice 300g', price: 90, rice: true },
            { id: 'r_400', name: 'Sticky Rice 400g', price: 120, rice: true },
            { id: 'r_500', name: 'Sticky Rice Half a Kilo', price: 150, rice: true },
            { id: 'r_1k', name: 'Sticky Rice 1 Kilogram', price: 300, rice: true }
        ];

        let orderId = '';
        let cart = [];
        let printerDevice = null;
        let printerCharacteristic = null;
        let isConnecting = false;

        const menuContainer = document.getElementById('menu-container');
        MENU_ITEMS.forEach(item => {
            const btn = document.createElement('button');
            btn.className = 'menu-btn';
            btn.innerHTML = `<span>${item.name}</span><span style="color:#0070f3;">${item.price} ฿</span>`;
            btn.onclick = () => addToCart(item);
            menuContainer.appendChild(btn);
        });

        function pressKey(key) {
            if (key === 'C') orderId = '';
            else if (orderId.length < 4) orderId += key;
            document.getElementById('order-display').innerText = '#' + (orderId || '');
        }

        function addToCart(item) {
            let riceStr = null;
            if (item.rice) {
                const checkedBoxes = document.querySelectorAll('.rice-checkbox:checked');
                const selectedRices = Array.from(checkedBoxes).map(cb => cb.value);
                riceStr = selectedRices.length > 0 ? selectedRices.join(', ') : 'Normal (white)';
            }
            const mango = item.mango ? document.getElementById('mango-select').value : null;
            cart.push({ ...item, uid: Date.now(), selectedRice: riceStr, selectedMango: mango });
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            container.innerHTML = '';
            let total = 0;
            cart.forEach(item => {
                total += item.price;
                const div = document.createElement('div');
                div.className = 'cart-item';
                const optsArray = [item.selectedRice, item.selectedMango].filter(Boolean);
                const optsText = optsArray.length > 0 ? optsArray.join(' / ') : '';
                div.innerHTML = `<div><strong>${item.name}</strong><br><small style="color:#666">${optsText}</small></div>
                                 <div>${item.price} B <span style="color:red;cursor:pointer;margin-left:10px;" onclick="removeFromCart(${item.uid})">✕</span></div>`;
                container.appendChild(div);
            });
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('cart-total').innerText = total;
        }

        function removeFromCart(uid) {
            cart = cart.filter(item => item.uid !== uid);
            renderCart();
        }

        async function setupPrinterConnection(device) {
            if (!device) return false;
            try {
                printerDevice = device;
                printerDevice.removeEventListener('gattserverdisconnected', handleDisconnect);
                printerDevice.addEventListener('gattserverdisconnected', handleDisconnect);
                
                if (!printerDevice.gatt.connected) {
                    await printerDevice.gatt.connect();
                }
                const service = await printerDevice.gatt.getPrimaryService(0x18f0);
                printerCharacteristic = await service.getCharacteristic(0x2af1);
                
                document.getElementById('status').innerText = '🟢 เชื่อมต่อสำเร็จ (Auto)';
                document.getElementById('status').style.color = '#00cc74';
                return true;
            } catch (err) {
                console.error(err);
                document.getElementById('status').innerText = '🔴 การเชื่อมต่อหลุด';
                document.getElementById('status').style.color = 'red';
                printerCharacteristic = null;
                return false;
            }
        }

        async function tryAutoConnect() {
            if (isConnecting || (printerDevice && printerDevice.gatt.connected && printerCharacteristic)) return;
            isConnecting = true;
            document.getElementById('status').innerText = '🔄 กำลังเชื่อมต่ออัตโนมัติ...';
            document.getElementById('status').style.color = '#ff9f43';
            try {
                if (navigator.bluetooth && navigator.bluetooth.getDevices) {
                    const devices = await navigator.bluetooth.getDevices();
                    if (devices.length > 0) {
                        await setupPrinterConnection(devices[0]);
                    } else {
                        document.getElementById('status').innerText = '🟡 ต้องกดเชื่อมต่อครั้งแรกก่อน';
                    }
                }
            } catch (err) {
                console.error(err);
            } finally {
                isConnecting = false;
            }
        }

        async function connectPrinterManually() {
            try {
                isConnecting = true;
                document.getElementById('status').innerText = 'กำลังเชื่อมต่อ...';
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [0x18f0] }, { namePrefix: 'AN581' }, { namePrefix: 'Printer' }],
                    optionalServices: [0x18f0]
                });
                await setupPrinterConnection(device);
            } catch (err) {
                document.getElementById('status').innerText = '❌ เชื่อมต่อล้มเหลว';
                document.getElementById('status').style.color = 'red';
            } finally {
                isConnecting = false;
            }
        }

        function handleDisconnect() {
            document.getElementById('status').innerText = '🔴 การเชื่อมต่อหลุด';
            document.getElementById('status').style.color = 'red';
            printerCharacteristic = null;
            setTimeout(tryAutoConnect, 3000);
        }

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') { tryAutoConnect(); }
        });
        window.addEventListener('focus', tryAutoConnect);
        setTimeout(tryAutoConnect, 1000);

        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

        async function sendBitmapToPrinter(ctx, width, totalHeight) {
            if (!printerCharacteristic) {
                await tryAutoConnect();
                if (!printerCharacteristic) {
                    alert('ไม่สามารถเชื่อมต่อเครื่องพิมพ์ได้ กรุณากดเชื่อมต่อ Manual');
                    return;
                }
            }

            const imgData = ctx.getImageData(0, 0, width, totalHeight).data;
            const bitWidth = width / 8;
            const bitmap = [0x1D, 0x76, 0x30, 0, bitWidth & 0xFF, (bitWidth >> 8) & 0xFF, totalHeight & 0xFF, (totalHeight >> 8) & 0xFF];

            for (let y = 0; y < totalHeight; y++) {
                for (let x = 0; x < bitWidth; x++) {
                    let byte = 0;
                    for (let bit = 0; bit < 8; bit++) {
                        const rIndex = (y * width + (x * 8 + bit)) * 4;
                        if ((0.299 * imgData[rIndex] + 0.587 * imgData[rIndex + 1] + 0.114 * imgData[rIndex + 2]) < 128) {
                            byte |= (0x80 >> bit);
                        }
                    }
                    bitmap.push(byte);
                }
            }
            bitmap.push(0x1B, 0x64, 0x03, 0x1D, 0x56, 0x42, 0x00);

            const uint8Array = new Uint8Array(bitmap);
            const chunkSize = 128; 
            for (let i = 0; i < uint8Array.length; i += chunkSize) {
                const chunk = uint8Array.slice(i, i + chunkSize);
                await printerCharacteristic.writeValue(chunk);
                await sleep(10); 
            }
        }

        // 1. 通常の明細付きレシート (プレミアム・リデザイン版)
        async function handlePrint() {
            const width = 384;
            let bodyHeight = 0;
            cart.forEach(item => {
                bodyHeight += 45; 
                if (item.selectedRice || item.selectedMango) { bodyHeight += 32; }
                bodyHeight += 12; 
            });
            // ヘッダー230px + 明細 + フッター160px
            const totalHeight = 230 + bodyHeight + 160; 

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = width; canvas.height = totalHeight;

            ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, width, totalHeight);
            ctx.fillStyle = '#000000'; ctx.textAlign = 'center';
            
            // ① 【新仕様】最上部に店名を中央配置
            ctx.font = 'bold 22px Arial'; ctx.fillText('ข้าวเหนียวมะม่วงแม่สุดารัตน์', width / 2, 38);
            
            // サブタイトル
            ctx.font = 'bold 18px Arial'; ctx.fillText('LINE MAN ORDER', width / 2, 65);
            
            // ② 【新仕様】注文番号を黒背景×白抜きの「反転表示」にしてガチ感を演出
            ctx.fillRect(42, 85, width - 84, 75); // 黒い座布団を敷く
            ctx.fillStyle = '#ffffff'; ctx.textAlign = 'center';
            ctx.font = 'bold 54px Arial'; ctx.fillText(`#${orderId || '0000'}`, width / 2, 140); // 白い文字
            
            // 装飾用の二重線をCanvasで表現
            ctx.fillStyle = '#000000';
            ctx.fillRect(12, 185, width - 24, 4); // 上の太い線
            ctx.fillRect(12, 194, width - 24, 1); // 下の細い線

            let currentY = 235;
            let total = 0;
            cart.forEach(item => {
                ctx.textAlign = 'left';
                ctx.font = 'bold 24px Arial'; ctx.fillText(item.name, 12, currentY);
                ctx.textAlign = 'right'; ctx.fillText(`${item.price} B`, width - 12, currentY);
                total += item.price; currentY += 34;
                const opts = [item.selectedRice, item.selectedMango].filter(Boolean).join(' / ');
                if(opts) { 
                    ctx.textAlign = 'left';
                    ctx.font = 'bold 18px Arial'; ctx.fillText(`* ${opts}`, 25, currentY); 
                    currentY += 28;
                }
                currentY += 12; 
            });

            // 明細下の境界線
            ctx.fillRect(12, currentY, width - 24, 1);
            ctx.fillRect(12, currentY + 6, width - 24, 4);

            // 合計金額
            ctx.textAlign = 'left';
            ctx.font = 'bold 28px Arial'; ctx.fillText('ยอดรวมทั้งหมด:', 12, currentY + 55);
            ctx.textAlign = 'right'; ctx.fillText(`${total} ฿`, width - 12, currentY + 55);

            // ③ 【新仕様】最下部にサンクスメッセージを追加
            ctx.textAlign = 'center';
            ctx.font = 'bold 18px Arial'; 
            ctx.fillText('* ขอบคุณที่อุดหนุนค่ะ *', width / 2, currentY + 110);

            await sendBitmapToPrinter(ctx, width, totalHeight);
            cart = []; orderId = ''; document.getElementById('order-display').innerText = '#'; renderCart();
        }

        // 2. 番号のみのレシート (プレミアム・リデザイン版)
        async function handlePrintNumberOnly() {
            const width = 384;
            const totalHeight = 210; // 反転表示に伴い、高さを210pxに最適化

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = width; canvas.height = totalHeight;

            ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, width, totalHeight);
            ctx.fillStyle = '#000000'; ctx.textAlign = 'center';
            
            // ① 【新仕様】店名を上部に出力
            ctx.font = 'bold 22px Arial'; ctx.fillText('ข้าวเหนียวมะม่วงแม่สุดารัตน์', width / 2, 38);
            ctx.font = 'bold 16px Arial'; ctx.fillText('คิวออเดอร์ (QUEUE)', width / 2, 62);
            
            // ② 【新仕様】こちらも同様に「反転黒座布団」で圧倒的な視認性を確保
            ctx.fillRect(32, 80, width - 64, 90); // ひとまわり大きな座布団
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 68px Arial'; ctx.fillText(`#${orderId || '0000'}`, width / 2, 148);
            
            await sendBitmapToPrinter(ctx, width, totalHeight);
        }
    </script>
</body>
</html>
